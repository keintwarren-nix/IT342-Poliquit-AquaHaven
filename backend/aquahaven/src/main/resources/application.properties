# Server
server.port=8080

# MySQL via XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/aquahaven_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
